<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shop</title>

        <!-- Poppins -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Poppins", sans-serif;
                margin: 0;
                background-color: #ffffff;
                color: #000000;
            }

            /* Top bar (Header) */
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 4vw;
                height: 80px;
                border-bottom: 1px solid #ddd;
                position: sticky;
                top: 0;
                background-color: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                z-index: 1000;
            }

            /* Logo and Navigation */
            .logo a {
                text-decoration: none;
                color: #000;
                position: relative;
            }

            .logo a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 1.5px;
                background-color: #000;
                opacity: 0;
            }

            .logo a:hover::after {
                opacity: 1;
            }

            .logo {
                display: flex;
                align-items: center;
                font-size: 1.5rem;
                font-weight: 400;
            }

            nav a {
                margin-left: 2rem;
                text-decoration: none;
                color: #000;
                font-weight: 400;
            }

            /* Main content layout */
            main {
                padding: 4rem 4vw;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
            }

            /* Content box */
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                line-height: 1.6;
            }

            /* Text styling */
            h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
            }

            p {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            /* Technologies section */
            .technologies {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.5rem;
            }

            .technologies a {
                position: relative;
                text-decoration: none;
                color: #000;
                display: block;
                padding-bottom: 2px;
            }

            .technologies a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 2px;
                background-color: #000;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .technologies a:hover::after {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="/contact/">Contact</a>
            </div>
            <nav>
                <a href="/shop/">Shop</a>
                <a href="/work/">Work</a>
                <a href="/about/">About</a>
                <a href="/contact/">Contact</a>
            </nav>
        </header>

        <main>
            <div class="content">
                <h1>Let's talk!</h1>
                <p>Send an email and I will answer within a week.</p>

                <h2>chipcord@duck.com</h2>
            </div>
        </main>
    </body>
</html>
