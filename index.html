<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png" type="image/png">

    <style>
        body {
            background-color: #1E1E1E;
            color: #7A7A7A;
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 80%;
            width: 100%;
            padding-left: 5%;
            box-sizing: border-box;
        }
        a {
            color: #D4D4D4;
            text-decoration: none;
            position: relative;
        }
        a:hover {
            color: #D72828;
        }
        .hover-image {
            position: absolute;
            display: none;
            width: 150px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, I'm Chip</h1>
        <p>I'm a student busy with school, but in my freetime I'm a designer/developer</p>

        <div class="section">
            <h2>Links</h2>
            <a href="https://chipcord.itch.io" class="hoverable">itch.io</a>
            <a href="https://dribbble.com/ChipCord" class="hoverable">dribbble</a>
            <a href="https://www.youtube.com/@Chipcord" class="hoverable">youtube</a>
        </div>

        <div class="section">
            <h2>Games</h2>
            <a href="https://chipcord.itch.io/rudy-the-ravanger" class="hoverable">Rudy The Ravanger</a>
            <a href="https://chipcord.itch.io/flower-finder" class="hoverable">Flowerfinder</a>
            <a href="https://scratch.mit.edu/studios/36278066/" class="hoverable">Games from my early ages</a>
        </div>

        <div class="section">
            <h2>Design</h2>
            <a href="https://dribbble.com/shots/25609991-I-m-A-Designer" class="hoverable">I'm A Designer</a>
            <a href="https://dribbble.com/shots/24412439-Sticky-Orange-Posters" class="hoverable">Sticky Orange</a>
            <a href="https://dribbble.com/shots/25604024-Chip" class="hoverable">Chip Branding</a>
            <a href="https://scratch.mit.edu/studios/30114594/" class="hoverable">Designs at scratch</a>
        </div>

        <div class="section">
            <h2>Fonts</h2>
            <a href="https://chipcord.github.io/circuit" class="hoverable">Circuit</a>
        </div>
    </div>

    <img id="hoverImage" class="hover-image" alt="">

    <script>
        document.querySelectorAll('.hoverable').forEach(link => {
            link.addEventListener('mouseover', function(event) {
                const imageName = this.textContent.trim().toLowerCase().replace(/\\s+/g, '-') + '.png';
                const imagePath = imageName;
                
                fetch(imagePath, { method: 'HEAD' })
                    .then(response => {
                        if (response.ok) {
                            const hoverImage = document.getElementById('hoverImage');
                            hoverImage.src = imagePath;
                            hoverImage.style.display = 'block';
                        }
                    });
            });

            link.addEventListener('mousemove', function(event) {
                const hoverImage = document.getElementById('hoverImage');
                hoverImage.style.top = (event.clientY - 20) + 'px';
                hoverImage.style.left = (event.clientX + 20) + 'px';
            });

            link.addEventListener('mouseleave', function() {
                const hoverImage = document.getElementById('hoverImage');
                hoverImage.style.display = 'none';
            });
        });
    </script>

</body>
</html>
