<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip's Portfolio</title>
    <style>
        body {
            background-color: #1E1E1E; /* Background */
            color: #7A7A7A; /* Text */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 80%; /* Smaller container width */
            width: 100%;
            padding-left: 5%;
            box-sizing: border-box;
        }

        a {
            color: #D4D4D4; /* Links */
            text-decoration: none; /* Removes underline from links */
        }

        a:hover {
            color: #D72828; /* Hover effect */
        }

        h1 {
            font-size: 4vw; /* Scaled size for larger screens */
            color: #D4D4D4; /* Set to the same color as links */
            margin-bottom: 8px;
        }

        p {
            font-size: 2.5vw; /* Scaled size for larger screens */
            color: #D4D4D4; /* Set to the same color as links */
            margin-bottom: 15px;
        }

        h2 {
            font-size: 3vw; /* Scaled size for larger screens */
            color: #D4D4D4; /* Set to the same color as links */
            margin-bottom: 10px;
        }

        .section {
            margin-bottom: 15px;
        }

        .section a {
            display: block;
            margin-bottom: 6px;
            font-size: 2vw; /* Scaled size for larger screens */
        }

        /* Media Queries for Larger Screens (like Mac) */
        @media (min-width: 1024px) {
            h1 {
                font-size: 32px; /* Fixed size for h1 on larger screens */
            }

            p {
                font-size: 18px; /* Fixed size for paragraph on larger screens */
            }

            h2 {
                font-size: 24px; /* Fixed size for section headers on larger screens */
            }

            .section a {
                font-size: 16px; /* Fixed size for links on larger screens */
            }

            .container {
                max-width: 60%; /* Smaller container for larger screens */
            }
        }

        /* Media Queries for Smaller Screens (like mobile) */
        @media (max-width: 600px) {
            h1 {
                font-size: 6vw; /* Larger font size for h1 on smaller screens */
            }

            p {
                font-size: 4vw; /* Larger font size for paragraph on smaller screens */
            }

            h2 {
                font-size: 5vw; /* Larger font size for section headers on smaller screens */
            }

            .section a {
                font-size: 4vw; /* Larger font size for links on smaller screens */
            }

            .container {
                max-width: 90%; /* Make the container wider on small screens */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, I'm Chip</h1>
        <p>I'm a student busy with school, but in my freetime I'm a designer/developer</p>

        <div class="section">
            <h2>Links</h2>
            <a href="https://chipcord.itch.io" target="_blank">itch.io</a>
            <a href="https://dribbble.com/ChipCord" target="_blank">dribbble</a>
            <a href="https://www.youtube.com/@Chipcord" target="_blank">youtube</a>
        </div>

        <div class="section">
            <h2>Games</h2>
            <a href="https://chipcord.itch.io/rudy-the-ravanger" target="_blank">Rudy The Ravanger</a>
            <a href="https://chipcord.itch.io/flower-finder" target="_blank">Flowerfinder</a>
            <a href="https://scratch.mit.edu/studios/36278066/" target="_blank">Games from my early ages</a>
        </div>

        <div class="section">
            <h2>Design</h2>
            <a href="https://dribbble.com/shots/25609991-I-m-A-Designer" target="_blank">I'm A Designer</a>
            <a href="https://dribbble.com/shots/24412439-Sticky-Orange-Posters" target="_blank">Sticky Orange</a>
            <a href="https://dribbble.com/shots/25604024-Chip" target="_blank">Chip Branding</a>
            <a href="https://scratch.mit.edu/studios/30114594/" target="_blank">Designs at scratch</a>
        </div>
    </div>

</body>
</html>
