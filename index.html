<!DOCTYPE html>
<html lang="en">
<head>

    <title>Chip's Portfolio</title>
    <style>
        body {
            background-color: #1E1E1E; /* Background */
            color: #7A7A7A; /* Text */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 80%; /* Makes the content width flexible */
            width: 100%;
            padding-left: 5%; /* Slight padding to the left */

        }

        a {
            color: #D4D4D4; /* Links */
            text-decoration: none; /* Removes underline from links */
        }

        a:hover {
            color: #D72828; /* Hover effect */
        }

        h1, p {
            color: #D4D4D4; /* Set to the same color as links */
            font-size: 4vw; /* Adjusted font size */
        }

        h2 {
            color: #D4D4D4;
            font-size: 2.5vw; /* Scaled down font size for h2 headers */
            margin-bottom: 10px;
        }

        h1, h2 {
            border-bottom: none !important; /* Removes underline */
            margin-bottom: 10px; /* Adjust spacing if needed */
        }

        .section {
            margin-bottom: 20px;
        }

        .section a {
            display: block;
            margin-bottom: 10px;
            font-size: 1.5vw; /* Smaller responsive font size for links */
        }
    </style>
</head>
