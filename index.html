<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shop</title>

        <!-- Poppins -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />

        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Poppins", sans-serif;
                margin: 0;
                background-color: #ffffff;
                color: #000000;
            }

            /* Top bar (Header) */
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 4vw;
                height: 80px;
                border-bottom: 1px solid #ddd;
                position: sticky;
                top: 0;
                background-color: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                z-index: 1000;
            }

            /* Logo and Navigation */
            .logo a {
                text-decoration: none;
                color: #000;
                position: relative;
            }

            .logo a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 1.5px;
                background-color: #000;
                opacity: 0;
            }

            .logo a:hover::after {
                opacity: 1;
            }

            .logo {
                display: flex;
                align-items: center;
                font-size: 1.5rem;
                font-weight: 400;
            }

            nav a {
                margin-left: 2rem;
                text-decoration: none;
                color: #000;
                font-weight: 400;
            }

            /* Main content layout */
            main {
                padding: 4rem 4vw;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
            }



            /* Content box */
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                line-height: 1.6;
            }

            /* Text styling */
            h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                font-weight: 600;
            }

            p {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            /* Technologies section */
            .technologies {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 0.5rem;
                margin-top: 4rem;
            }

            .technologies a {
                position: relative;
                text-decoration: none;
                color: #000;
                display: block;
                padding-bottom: 2px;
            }

            .technologies a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 0.2rem;
                background-color: #000;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .technologies a:hover::after {
                opacity: 1;
            }

            .arrow {
                font-family: "Noto Sans Symbols", sans-serif;
                margin-right: 0.4rem;
                padding-bottom: 0.2rem;
                font-size: 4rem;
            }

            .location {
                font-family: "Poppins", sans-serif;
                margin-right: 0.4rem;
                padding-bottom: 0.2rem;
                font-size: 4rem;
                font-weight: 400;
            }
            .logo-image {
                margin-top: 3rem;
                position: relative;
                width: 10%;
                aspect-ratio: 1 / 1;
                overflow: hidden;
                height: auto;
                display: block;
                opacity: 1;
                transition: opacity 0.7s ease-in-out;
                border-radius: 8px;
            }
        </style>
    </head>

        <main>
            <div class="content">
                <img
                    class="logo-image"
                    src="/Chip2.jpg"
                    alt="Logo"
                />


                <div class="technologies">
                    <a
                        class="location"
                        href="/shop/"
                        >Shop <span class="arrow">→</span></a
                    >
                    <a
                        class="location"
                        href="/work/"
                        >Work <span class="arrow">→</span></a
                    >
                    <a
                        class="location"
                        href="/about/"
                        >About <span class="arrow">→</span></a
                    >
                    <a
                        class="location"
                        href="/contact/"
                        >Contact <span class="arrow">→</span></a
                    >
                </div>
            </div>
        </main>
    </body>
</html>
