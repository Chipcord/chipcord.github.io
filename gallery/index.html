<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shop</title>

        <!-- Poppins -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
        <!-- Noto Sans Symbols -->
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Poppins", sans-serif;
                margin: 0;
                background-color: #ffffff;
                color: #000000;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 4vw; /* You can adjust the padding here to suit your needs */
                height: 80px; /* Set a fixed height for the header */
                border-bottom: 1px solid #ddd;
                position: sticky;
                top: 0;
                background-color: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                z-index: 1000;
            }
            .logo a {
                text-decoration: none;
                color: #000;
                position: relative;
            }
            .logo a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 1.5px;
                background-color: #000;
                opacity: 0;
            }
            .logo a:hover::after {
                opacity: 1;
            }
            .logo {
                display: flex;
                align-items: center;
                font-size: 1.5rem;
                font-weight: 400;
            }
            .logo-arrow {
                font-family: "Noto Sans Symbols", sans-serif;
                margin-right: 0.4rem;
                padding-bottom: 0.2rem;
                font-size: 1.5rem;
            }
            .arrow {
                font-family: "Noto Sans Symbols", sans-serif;
            }
            nav a {
                margin-left: 2rem;
                text-decoration: none;
                color: #000;
                font-weight: 400;
            }
            .shop-grid {
                display: grid;
                grid-template-columns: repeat(1, 1fr);
                justify-content: center;
                gap: 0rem;
                padding: 4rem 4vw;
            }
            .product-card {
                display: flex;
                flex-direction: column;
                align-items: flex-start; /* This will align the content inside the product-card to the left */
                padding: 0;
                position: relative;
            }
            .image-container {
                position: relative;
                width: 100%;
                max-width: 1350px;
                height: auto;
                transition: transform 0.3s ease;
            }

            .product-image {
                width: 100%;
                height: auto;
                display: block;
                opacity: 1;
            }

            .collection {
                display: grid;
                grid-template-columns: repeat(4, 1fr); /* Two items per row */
                gap: 1rem;
                margin-bottom: 5rem;
            }
            .collection-header {
                font-size: 2rem;
                font-weight: 400;
                text-align: left; /* Align header to the left */
                margin-bottom: 1rem;
            }
            .single-image {
                width: 30vw;
                height: auto;
                gap: 1rem;
                margin-bottom: 5rem;
            }
            .single-wide-image {
                width: 50vw;
                height: auto;
                gap: 1rem;
                margin-bottom: 5rem;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="/gallery/">Personal Work</a>
            </div>
            <nav>
                <a href="/shop/">Shop</a>

                <a href="/contact/">Contact</a>
