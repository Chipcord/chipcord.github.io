<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shop</title>

        <!-- Poppins -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
        <!-- Noto Sans Symbols -->
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Poppins", sans-serif;
                margin: 0;
                background-color: #ffffff;
                color: #000000;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 4vw; /* You can adjust the padding here to suit your needs */
                height: 80px; /* Set a fixed height for the header */
                border-bottom: 1px solid #ddd;
                position: sticky;
                top: 0;
                background-color: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                z-index: 1000;
            }
            .logo a {
                text-decoration: none;
                color: #000;
                position: relative;
            }
            .logo a::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                width: 100%;
                height: 1.5px;
                background-color: #000;
                opacity: 0;
            }
            .logo a:hover::after {
                opacity: 1;
            }
            .logo {
                display: flex;
                align-items: center;
                font-size: 1.5rem;
                font-weight: 400;
            }
            .logo-arrow {
                font-family: "Noto Sans Symbols", sans-serif;
                margin-right: 0.4rem;
                padding-bottom: 0.2rem;
                font-size: 1.5rem;
            }
            .arrow {
                font-family: "Noto Sans Symbols", sans-serif;
            }
            nav a {
                margin-left: 2rem;
                text-decoration: none;
                color: #000;
                font-weight: 400;
            }
            .shop-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                justify-content: center;
                gap: 3rem;
                padding: 4rem 4vw;
            }
            .product-card {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 0;
                position: relative;
            }
            .image-container {
                position: relative;
                width: 100%;
                max-width: 1350px;
                height: auto;
            }
            .product-image {
                border-radius: 8px;
                width: 100%;
                height: auto;
                display: block;
                opacity: 1;
            }
            .hover-image {
                border-radius: 8px;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: auto;
                opacity: 0;
            }
            .product-card:hover .product-image {
                opacity: 1;
            }
            .product-card:hover .hover-image {
                opacity: 0;
            }
            .product-title {
                font-size: 1.2rem;
                font-weight: 500;
                text-align: center;
                margin-bottom: 1.5rem;
                margin-top: 1.5rem;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="/shop/">Shop</a>
            </div>
            <nav>
                <a href="/shop/">Shop</a>
                <a href="/work/">Work</a>
                <a href="/about/">About</a>
                <a href="/contact/">Contact</a>
            </nav>
        </header>

        <main>
            <div class="shop-grid">
                <div class="product-card">
                    <div class="image-container">
                        <a href="/shop/fonts/">
                            <img
                                class="product-image"
                                src="/shop/Fonts.svg"
                                alt="Fonts Preview"
                            />
                            <img
                                class="hover-image"
                                src="/shop/Fonts.svg"
                                alt="Fonts Preview Hover"
                            />
                        </a>
                    </div>
                    <div class="product-title">Fonts</div>
                </div>

                <div class="product-card">
                    <div class="image-container">
                        <a href="/shop/games/">
                            <img
                                class="product-image"
                                src="/shop/Games.svg"
                                alt="Circuit Font Preview"
                            />
                            <img
                                class="hover-image"
                                src="/shop/Games.svg"
                                alt="Circuit Font Preview Hover"
                            />
                        </a>
                    </div>
                    <div class="product-title">Games</div>
                </div>
            </div>
        </main>
    </body>
</html>
