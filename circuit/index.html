<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Display</title>

    <!-- Load Custom Font -->
    <style>
        @font-face {
            font-family: 'CircuitFont';
            src: url('Circuit-Display.woff2') format('woff2'); /* Corrected font file */
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #1E1E1E; /* Default dark background */
            color: #D4D4D4; /* Default text color */
            font-family: Arial, sans-serif; /* Fallback font */
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .text-container {
            font-family: 'CircuitFont', Arial, sans-serif; /* Apply Custom Font */
            font-size: 20vw; /* Large text */
            line-height: 180px; /* Set vertical spacing */
            margin: 0; /* Remove default margins */
            padding: 10px;
            word-wrap: break-word;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        input[type="color"] {
            border: none;
            width: 50px;
            height: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="text-container">
        The quick brown fox jumps over the lazy dog.
    </div>

    <div class="controls">
        <label>Text Color: <input type="color" id="textColorPicker" value="#D4D4D4"></label>
        <label>Background Color: <input type="color" id="bgColorPicker" value="#1E1E1E"></label>
    </div>

    <script>
        document.getElementById('textColorPicker').addEventListener('input', function() {
            document.querySelector('.text-container').style.color = this.value;
        });

        document.getElementById('bgColorPicker').addEventListener('input', function() {
            document.body.style.backgroundColor = this.value;
        });
    </script>

</body>
</html>
