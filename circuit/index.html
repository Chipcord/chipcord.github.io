<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Display</title>

    <!-- Load Custom Font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Load Custom Font -->
    <style>
        @font-face {
            font-family: 'CircuitFont';
            src: url('Circuit-Display.woff2') format('woff2'); /* Corrected font file */
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000; /* Black background */
            color: #FFFFFF; /* White text color */
            font-family: Arial, sans-serif; /* Fallback font */
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Align text at the top */
            height: 100vh;
            padding-top: 20px; /* Adds spacing from the top */
        }

        .text-container {
            font-family: 'CircuitFont', Arial, sans-serif; /* Apply Custom Font */
            font-size: 20vw; /* Large text */
            line-height: 193px; /* Set vertical spacing */
            margin: 0; /* Remove default margins */
            padding: 0;
            word-wrap: break-word;
            max-width: 90%; /* Prevent text overflow */
        }

        /* Style for the 'Back' link using the Inter font */
        .back-link {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Inter', sans-serif; /* Apply Inter font */
            font-size: 30px; /* Make the text bigger */
            color: #FFFFFF; /* Default text color */
            text-decoration: none; /* Remove default underline */
        }

        .back-link:hover {
            color: #D72828; /* Color on hover */
            text-decoration: underline; /* Underline on hover */
        }

        /* Style for the new sentence at the bottom left */
        .bottom-left-sentence {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-family: 'Inter', sans-serif; /* Apply Inter font */
            font-size: 25px; /* Slightly smaller than the 'Back' button */
            color: #FFFFFF; /* White color for text */
        }
    </style>
</head>
<body>

    <a href="https://chipcord.github.io" class="back-link">Back</a>

    <div class="text-container">
        When zombies arrive quickly fax Judge Pat.
    </div>

    <!-- New sentence at the bottom left -->
    <div class="bottom-left-sentence">
        This is a new sentence in Inter font.
    </div>

</body>
</html>
