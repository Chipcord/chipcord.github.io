<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Display</title>

    <!-- Load inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Font displayed -->
    <style>
        @font-face {
            font-family: 'Circuit';
            src: url('Circuit-Display.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 250vh; /* Increased to allow more scrolling */
            padding-top: 20px;
            padding-bottom: 40px; /* Added padding at the bottom for extra space */
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        .text-container {
            font-family: 'Circuit', Arial, sans-serif;
            font-size: clamp(8vw, 10vw, 20vw);
            line-height: 0.68;
            margin: 0;
            padding: 0;
            word-wrap: break-word;
            max-width: 90%;
            display: block; /* Makes the text break into multiple lines */
            word-break: break-word; /* Prevents long words from overflowing */
            white-space: normal; /* Allows line breaks between words */
            text-align: center; /* Center align the words */
        }

        .back-link {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 30px;
            color: #FFFFFF;
            text-decoration: none;
        }

        .back-link:hover {
            color: #D72828;
            text-decoration: underline;
        }

        .download-button {
            margin-top: 40px;
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .download-button:hover {
            background-color: #D72828 !important;
            color: #FFFFFF;
        }

        .section {
            width: 90%;
            max-width: 800px;
            text-align: left;
            font-family: 'Inter', sans-serif;
            margin: 20px auto;
        }

        .section h2 {
            font-size: 0.8rem;
            margin-bottom: 0.7px;
            font-weight: normal;
        }

        .section p {
            font-size: 1.3rem;
            line-height: 1.4;
            font-weight: normal;
        }

        .section a {
            color: #FFFFFF;
            text-decoration: none;
        }

        .section a:hover {
            text-decoration: underline;
        }

        .typography-images {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .typography-images img {
            width: 25vw;
            height: auto;
            transition: transform 0.3s ease, z-index 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .typography-images img.hovered {
            transform: scale(1.3);
            z-index: 10;
        }

        .typography-images img:not(.hovered) {
            transform: scale(1);
            z-index: 1;
        }

        /* Media query for small screens */
        @media (max-width: 600px) {
            body {
                padding-top: 60px;
            }

            .text-container {
                font-size: clamp(8vw, 10vw, 20vw);
            }

            .typography-images {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .typography-images img {
                width: 80vw;
            }
        }
    </style>
</head>
<body>
