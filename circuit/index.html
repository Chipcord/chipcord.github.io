<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Display</title>

    <!-- Load Custom Font -->
    <style>
        @font-face {
            font-family: 'CircuitFont';
            src: url('Circuit-Display.woff2') format('woff2'); /* Corrected font file */
            font-weight: normal;
            font-style: normal;
        }

        /* Link to Google Material Icons */
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        body {
            background-color: #000000; /* Black background */
            color: #FFFFFF; /* White text color */
            font-family: Arial, sans-serif; /* Fallback font */
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Align text at the top */
            height: 100vh;
            padding-top: 20px; /* Adds spacing from the top */
        }

        .text-container {
            font-family: 'CircuitFont', Arial, sans-serif; /* Apply Custom Font */
            font-size: 20vw; /* Large text */
            line-height: 193px; /* Set vertical spacing */
            margin: 0; /* Remove default margins */
            padding: 0;
            word-wrap: break-word;
            max-width: 90%; /* Prevent text overflow */
        }

        /* Style for the back arrow */
        .back-arrow {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 40px;
            color: #FFFFFF; /* Default white color */
            cursor: pointer;
            transition: color 0.3s; /* Smooth color transition */
        }

        .back-arrow:hover {
            color: #D72828; /* Hover effect color */
        }
    </style>
</head>
<body>

    <!-- Back Arrow Icon -->
    <a href="https://chipcord.github.io" class="back-arrow">
        <span class="material-icons">arrow_back</span>
    </a>

    <div class="text-container">
        When zombies arrive quickly fax Judge Pat.
    </div>

</body>
</html>
